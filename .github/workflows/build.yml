name: Build Zepp OS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zeus CLI
        run: npm install -g @zeppos/zeus-cli

      - name: Fix missing zeppos-app-utils dependency
        run: |
          npm install -g zeppos-app-utils
          ZEUS_NM=$(npm root -g)/@zeppos/zeus-cli/node_modules
          mkdir -p "$ZEUS_NM"
          cp -r "$(npm root -g)/zeppos-app-utils" "$ZEUS_NM/zeppos-app-utils"

      - name: Configure zeus session
        env:
          ZEUS_CONFIG: ${{ secrets.ZEUS_CONFIG }}
        run: |
          mkdir -p ~/.zepp
          echo "$ZEUS_CONFIG" | base64 -d > ~/.zepp/.zeus

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build ZAB
        run: zeus build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starline-zepp-${{ steps.version.outputs.version }}
          path: dist/*.zab
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zeus CLI
        run: npm install -g @zeppos/zeus-cli

      - name: Fix missing zeppos-app-utils dependency
        run: |
          npm install -g zeppos-app-utils
          ZEUS_NM=$(npm root -g)/@zeppos/zeus-cli/node_modules
          mkdir -p "$ZEUS_NM"
          cp -r "$(npm root -g)/zeppos-app-utils" "$ZEUS_NM/zeppos-app-utils"

      - name: Configure zeus session
        env:
          ZEUS_CONFIG: ${{ secrets.ZEUS_CONFIG }}
        run: |
          mkdir -p ~/.zepp
          echo "$ZEUS_CONFIG" | base64 -d > ~/.zepp/.zeus

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build ZAB
        run: zeus build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StarLine Zepp v${{ steps.version.outputs.version }}"
          body: |
            ## StarLine Remote v${{ steps.version.outputs.version }}

            ### Установка на часы
            1. Включить **Режим разработчика** в Zepp App (Профиль → несколько тапов по версии)
            2. Скачать `.zab` файл ниже
            3. Установить через zeus: `zeus preview` (выбрать GTR 4) или отсканировать QR из `zeus preview`
          files: dist/*.zab
