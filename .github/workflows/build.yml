name: Build Zepp OS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zeus CLI
        run: npm install -g @zeppos/zeus-cli

      - name: Configure zeus session
        env:
          ZEUS_CONFIG: ${{ secrets.ZEUS_CONFIG }}
        run: |
          mkdir -p ~/.zepp
          echo "$ZEUS_CONFIG" | base64 -d > ~/.zepp/.zeus

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build ZAB
        run: zeus build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starline-zepp-${{ steps.version.outputs.version }}
          path: dist/*.zab
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: starline-zepp-${{ needs.build.outputs.version }}
          path: dist/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StarLine Remote v${{ steps.version.outputs.version }}"
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
          body: |
            ## StarLine Remote v${{ steps.version.outputs.version }}

            Управление сигнализацией StarLine S96/S9 с часов Amazfit GTR 4.

            ### Установка
            1. Включить **Режим разработчика** в Zepp App
               (Профиль → несколько тапов по номеру версии)
            2. Скачать `.zab` файл ниже
            3. Установить: `zeus preview` → выбрать GTR 4 → отсканировать QR

            ### Настройка
            После установки открыть **Настройки** приложения в Zepp App:
            - Ввести Email / Пароль от аккаунта StarLine
            - Ввести App ID / Secret Key с [developer.starline.ru](https://developer.starline.ru)
            - Нажать **Войти** — появится список устройств
            - Скопировать ID нужного автомобиля в поле «ID устройства»
          files: dist/*.zab
