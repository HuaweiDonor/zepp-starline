name: Build Zepp OS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Zeus CLI
        run: npm install -g @zeppos/zeus-cli

      # Restore Zeus session from saved config (see README for how to generate ZEUS_CONFIG)
      - name: Restore Zeus credentials
        run: |
          mkdir -p ~/.zeus
          echo "${{ secrets.ZEUS_CONFIG }}" | base64 -d > ~/.zeus/global_config.json

      - name: Build .zpk
        run: zeus build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starline-zepp-${{ steps.version.outputs.version }}
          path: dist/*.zpk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Zeus CLI
        run: npm install -g @zeppos/zeus-cli

      - name: Restore Zeus credentials
        run: |
          mkdir -p ~/.zeus
          echo "${{ secrets.ZEUS_CONFIG }}" | base64 -d > ~/.zeus/global_config.json

      - name: Build .zpk
        run: zeus build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StarLine Zepp v${{ steps.version.outputs.version }}"
          body: |
            ## StarLine Remote v${{ steps.version.outputs.version }}

            ### Установка
            1. Скачать `.zpk` файл ниже
            2. Открыть Zepp App → Профиль → Режим разработчика
            3. Установить через `zeus preview` или вручную
          files: dist/*.zpk
