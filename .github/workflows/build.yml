name: Build Zepp OS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          CODE=$(node -p "require('./app.json').app.version.code")
          NAME=$(node -p "require('./app.json').app.appName")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Package .zpk
        run: |
          mkdir -p dist
          zip -r "dist/starline-zepp-${{ steps.version.outputs.version }}.zpk" \
            app.json \
            icon.png \
            device-app/ \
            side-service/ \
            settings-app/ \
            --exclude "*.DS_Store" \
            --exclude "*/.git/*"
          echo "Package contents:"
          unzip -l "dist/starline-zepp-${{ steps.version.outputs.version }}.zpk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starline-zepp-${{ steps.version.outputs.version }}
          path: dist/*.zpk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').app.version.name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package .zpk
        run: |
          mkdir -p dist
          zip -r "dist/starline-zepp-${{ steps.version.outputs.version }}.zpk" \
            app.json \
            icon.png \
            device-app/ \
            side-service/ \
            settings-app/ \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StarLine Zepp v${{ steps.version.outputs.version }}"
          body: |
            ## StarLine Remote v${{ steps.version.outputs.version }}

            ### Установка
            1. Скачать `.zpk` файл ниже
            2. Открыть Zepp App → Профиль → Режим разработчика
            3. Установить через `zeus preview` или вручную
          files: dist/*.zpk
